name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: App Version
      description: Which version are you running? (visible in Settings or title bar)
      placeholder: "e.g. 1.0.2"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux (RPM / Fedora)
        - Linux (DEB / Ubuntu / Debian)
        - Linux (AppImage)
        - Linux (tar.gz)
        - Windows
        - Web (npm run dev:web)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: |
        When I click on "Today" and switch to "By Project", the chart shows...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Open the app
        2. Click on "Today"
        3. Switch view to "By Project"
        4. See incorrect data in the chart
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Any relevant logs from the DevTools console or terminal
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem
    validations:
      required: false

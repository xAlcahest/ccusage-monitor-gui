name: Test Build

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"

jobs:
  linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --linux deb --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: test-linux-deb
          path: release/*.deb
          retention-days: 7

  linux-rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y rpm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --linux rpm --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: test-linux-rpm
          path: release/*.rpm
          retention-days: 7

  linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --linux AppImage --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: test-linux-appimage
          path: release/*.AppImage
          retention-days: 7

  linux-tar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --linux tar.gz --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: test-linux-tar
          path: release/*.tar.gz
          retention-days: 7

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: test-windows
          path: release/*.exe
          retention-days: 7

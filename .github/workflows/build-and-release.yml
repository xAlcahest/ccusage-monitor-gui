name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Set version from tag
        run: npm version "${GITHUB_REF#refs/tags/v}" --no-git-tag-version
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --linux deb --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/*.deb

  linux-rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Set version from tag
        run: npm version "${GITHUB_REF#refs/tags/v}" --no-git-tag-version
      - run: sudo apt-get update && sudo apt-get install -y rpm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --linux rpm --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: release/*.rpm

  linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Set version from tag
        run: npm version "${GITHUB_REF#refs/tags/v}" --no-git-tag-version
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --linux AppImage --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage

  linux-tar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Set version from tag
        run: npm version "${GITHUB_REF#refs/tags/v}" --no-git-tag-version
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --linux tar.gz --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: release/*.tar.gz

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Set version from tag
        shell: bash
        run: npm version "${GITHUB_REF#refs/tags/v}" --no-git-tag-version
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            release/*.exe

  release:
    needs: [linux-deb, linux-rpm, linux-appimage, linux-tar, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Upload to existing release, or create one if it doesn't exist
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" artifacts/* --clobber
          else
            PRERELEASE=""
            if [[ "$TAG" == *-* ]]; then
              PRERELEASE="--prerelease"
            fi
            gh release create "$TAG" artifacts/* $PRERELEASE --generate-notes
          fi

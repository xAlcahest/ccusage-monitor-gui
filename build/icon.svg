<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="cFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="cTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="cRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bg)"/>

  <!-- Cubic C - front face -->
  <path d="
    M 360 120
    L 160 120
    L 120 160
    L 120 352
    L 160 392
    L 360 392
    L 360 332
    L 200 332
    L 180 312
    L 180 200
    L 200 180
    L 360 180
    Z
  " fill="url(#cFace)"/>

  <!-- Cubic C - top face (3D extrusion) -->
  <path d="
    M 160 120
    L 360 120
    L 380 100
    L 180 100
    Z
  " fill="url(#cTop)"/>

  <path d="
    M 200 180
    L 360 180
    L 380 160
    L 220 160
    Z
  " fill="url(#cRight)" opacity="0.6"/>

  <!-- Cubic C - right side (3D extrusion) -->
  <path d="
    M 360 120
    L 380 100
    L 380 160
    L 360 180
    Z
  " fill="url(#cRight)"/>

  <path d="
    M 360 332
    L 380 312
    L 380 160
    L 360 180
    Z
  " fill="url(#cRight)" opacity="0.0"/>

  <path d="
    M 360 332
    L 380 312
    L 380 372
    L 360 392
    Z
  " fill="url(#cRight)"/>

  <!-- Bottom extrusion -->
  <path d="
    M 160 392
    L 180 412
    L 380 412
    L 360 392
    Z
  " fill="#7f1d1d"/>

  <!-- Left side extrusion -->
  <path d="
    M 120 160
    L 100 140
    L 100 332
    L 120 352
    Z
  " fill="#991b1b"/>

  <path d="
    M 120 160
    L 100 140
    L 160 100
    L 160 120
    Z
  " fill="url(#cTop)" opacity="0.5"/>

  <path d="
    M 120 352
    L 100 332
    L 140 372
    L 160 392
    Z
  " fill="#7f1d1d" opacity="0.8"/>

  <!-- Inner shadow for depth -->
  <path d="
    M 180 200
    L 180 312
    L 200 332
    L 360 332
    L 360 320
    L 200 320
    L 190 310
    L 190 202
    Z
  " fill="black" opacity="0.15"/>

  <!-- Highlight on front face -->
  <path d="
    M 160 120
    L 350 120
    L 350 130
    L 160 130
    Z
  " fill="white" opacity="0.15"/>

  <path d="
    M 120 160
    L 130 160
    L 130 345
    L 120 345
    Z
  " fill="white" opacity="0.1"/>
</svg>
